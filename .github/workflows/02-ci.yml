name: CI Workflow with Secret Versions

on:
  workflow_dispatch:

jobs:
  run-tests:
    name: Run tests on multiple Python secret versions
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"] # placeholder, cannot use secrets directly in matrix

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show secrets being used
        run: |
          echo "NADA_SECRET=${{ secrets.NADA_SECRET }}"
          echo "SECRET2=${{ secrets.SECRET2 }}"

      - name: Run tests on secret versions
        run: |
          for ver in "${{ secrets.NADA_SECRET }}" "${{ secrets.SECRET2 }}"
          do
            echo "==========================="
            echo "Testing on Python version $ver"
            echo "==========================="
            # Here you can run any commands that depend on the version
            # Example: run Python scripts or unittest
            python --version
          done