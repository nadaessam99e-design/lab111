name: 04 Deploy Workflow

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python base image tag"
        default: "3.12-slim"
        required: false

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  PYTHON_VERSION: ${{ inputs.python_version || '3.12-slim' }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          tags: ${{ env.IMAGE_NAME }}:run-${{ github.run_number }}
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-image
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

  deploy-container:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-image
          path: downloaded-artifact

      - name: Load Docker image
        run: docker load --input downloaded-artifact/${{ env.IMAGE_TAR }}

      - name: Start container
        run: |
          docker run -d \
            --name tiny-health-container \
            -p 8000:8000 \
            "${{ env.IMAGE_NAME }}:run-${{ github.run_number }}"

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true