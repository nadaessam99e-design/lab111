name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["03 Build Artifact Workflow"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: tiny-health-app-image
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifact

      - name: Show downloaded files
        run: ls -R downloaded-artifact

      - name: Load Docker image
        run: docker load --input downloaded-artifact/tiny-health-app.tar

      - name: Start container
        run: |
          docker rm -f tiny-health-container || true
          docker run -d --name tiny-health-container -p 8000:8000 tiny-health-app:3.12-slim

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "App is ready!"
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f tiny-health-container || true