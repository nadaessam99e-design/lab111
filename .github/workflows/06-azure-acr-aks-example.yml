name: 91 PR Verify Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Run tests on PR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v