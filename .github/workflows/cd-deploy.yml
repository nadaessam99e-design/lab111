name: 02 CD - Build and Deploy

on:
  push:
    branches: [ "main" ] # سيعمل فقط بعد الـ Merge بنجاح

env:
  ACR_LOGIN_SERVER: example.azurecr.io
  IMAGE_NAME: tiny-health-app
  AKS_NAMESPACE: demo
  AKS_DEPLOYMENT: tiny-health-app
  AKS_CONTAINER: tiny-health-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: echo "image_tag=run-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" .
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update AKS Deployment
        run: |
          kubectl set image "deployment/${{ env.AKS_DEPLOYMENT }}" \
            "${{ env.AKS_CONTAINER }}=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}" \
            -n "${{ env.AKS_NAMESPACE }}"
