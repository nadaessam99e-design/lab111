name: 01 CI - Verify PR

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
    paths:
      - "app/**"
      - "tests/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v
